name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
      - name: Deploy to Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        run: |
          mkdir -p public
          cp -r * public
      - name: Deploy
        uses: actions/deploy-pages@v1

# Not: Bu workflow GitHub Pages'in yeni Actions tabanlı deploy yöntemini kullanır; repo ayarlarından Pages için "GitHub Pages" yapılandırmasını kontrol et.
